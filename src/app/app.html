<div>

  <h2>Sistema de controle de produtos</h2>
  <p>Preencha o formulário para incluir um produto:</p>

  <form [formGroup]="produto" (ngSubmit)="cadastrarProduto()">

    <div>
      <label>Nome do produto:</label>
      <input formControlName="nome" type="text" placeholder="Digite o nome aqui"/>
    </div>
    
    <div>
      <label>Preço do produto:</label>
      <input formControlName="preco" type="text" placeholder="Digite o preço aqui"/>
    </div>

    <div>
      <label>Quantidade:</label>
      <input formControlName="quantidade" type="number" placeholder="Digite a quantidade aqui"/>
    </div>

    <div>
      <input type="submit" value="Realizar cadastro"/>
    </div>    

  </form>

</div>
